    <style>
      .title{font:bold 30px Arial;fill:#111827}.head{fill:#eef4ff;stroke:#2563eb;stroke-width:2;rx:8}.label{font:bold 14px Arial;fill:#111827}.small{font:12px Arial;fill:#374151}.life{stroke:#9ca3af;stroke-width:1.5;stroke-dasharray:7 6}.msg{stroke:#374151;stroke-width:2;marker-end:url(#arrow)}.ret{stroke:#2563eb;stroke-width:2;stroke-dasharray:8 6;marker-end:url(#arrowBlue)}
    </style>
