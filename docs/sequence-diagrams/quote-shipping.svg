  <line x1='80' y1='165' x2='230' y2='165' class='msg'/><text x='155' y='157' text-anchor='middle' class='small'>Pesquisa produto e informa CEP</text>
  <line x1='230' y1='220' x2='380' y2='220' class='msg'/><text x='305' y='212' text-anchor='middle' class='small'>POST /shipping/quote</text>
  <line x1='380' y1='275' x2='560' y2='275' class='msg'/><text x='470' y='267' text-anchor='middle' class='small'>POST /v1/checkouts/{id}/shipping-quote</text>
  <line x1='560' y1='330' x2='760' y2='330' class='msg'/><text x='660' y='322' text-anchor='middle' class='small'>POST /v1/shipping-promises/quote</text>

  <line x1='760' y1='405' x2='950' y2='405' class='msg'/><text x='855' y='397' text-anchor='middle' class='small'>GET product logistics</text>
  <line x1='950' y1='440' x2='760' y2='440' class='ret'/><text x='855' y='432' text-anchor='middle' class='small'>dados do produto</text>

  <line x1='760' y1='500' x2='1130' y2='500' class='msg'/><text x='945' y='492' text-anchor='middle' class='small'>GET inventory?sku&amp;sellerId</text>
