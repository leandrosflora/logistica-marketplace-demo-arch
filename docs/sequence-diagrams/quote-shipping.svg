  <line x1='560' y1='1015' x2='1820' y2='1015' class='msg'/><text x='1190' y='1007' text-anchor='middle' class='small'>checkout.shipping.quote.requested</text>
  <line x1='560' y1='1060' x2='380' y2='1060' class='ret'/><text x='470' y='1052' text-anchor='middle' class='small'>quote result</text>
  <line x1='380' y1='1100' x2='230' y2='1100' class='ret'/><text x='305' y='1092' text-anchor='middle' class='small'>prazo, preço e modalidade</text>
  <line x1='230' y1='1140' x2='80' y2='1140' class='ret'/><text x='155' y='1132' text-anchor='middle' class='small'>Exibe opções de entrega</text>
