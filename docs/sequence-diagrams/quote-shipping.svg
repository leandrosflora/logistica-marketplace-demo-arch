  <line x1='1490' y1='725' x2='760' y2='725' class='ret'/><text x='1125' y='717' text-anchor='middle' class='small'>rota e SLA</text>

  <line x1='760' y1='785' x2='1670' y2='785' class='msg'/><text x='1215' y='777' text-anchor='middle' class='small'>POST /carriers/options</text>
  <line x1='1670' y1='820' x2='760' y2='820' class='ret'/><text x='1215' y='812' text-anchor='middle' class='small'>opções de carrier</text>

  <line x1='760' y1='880' x2='1670' y2='880' class='msg'/><text x='1215' y='872' text-anchor='middle' class='small'>POST /shipping-prices/calculate</text>
  <line x1='1670' y1='915' x2='760' y2='915' class='ret'/><text x='1215' y='907' text-anchor='middle' class='small'>preço do frete</text>

