openapi: 3.0.3
info:
  title: Logística Envios - API Contracts
  version: 2026.06.25
  description: >-
    Contratos REST consolidados a partir dos endpoints implementados nos microservices
    em 2026-06-25. Este arquivo não documenta PaymentService nem AuditService,
    pois esses microservices não existem no conjunto atual.
servers:
  - url: http://localhost
    description: Base local genérica; cada microservice possui sua própria porta.

tags:
  - name: Health
  - name: ProductSearchService
  - name: CheckoutService
  - name: ShippingPromiseService
  - name: ProductCatalogService
  - name: InventoryService
  - name: FulfillmentCenterService
  - name: RoutingService
  - name: CarrierService
  - name: ShippingPricingService
  - name: OrderService
  - name: ShipmentService
  - name: TrackingService
  - name: NotificationService

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check genérico
      responses:
        '200': { description: OK }
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe quando implementado pelo serviço
      responses:
        '200': { description: OK }
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe quando implementado pelo serviço
      responses:
        '200': { description: OK }
        '503': { description: Dependência indisponível }

  /v1/products/search:
    get:
      tags: [ProductSearchService]
      summary: Busca produtos ativos no read model Postgres
      parameters:
        - { name: query, in: query, required: true, schema: { type: string } }
        - { name: page, in: query, required: false, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, required: false, schema: { type: integer, default: 20 } }
        - { name: zipCode, in: query, required: false, schema: { type: string } }
        - { name: region, in: query, required: false, schema: { type: string } }
      responses:
        '200': { description: Resultado paginado }
        '400': { description: Query inválida }

  /v1/checkouts/:
    post:
      tags: [CheckoutService]
      summary: Cria sessão de checkout
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Checkout criado }
        '400': { description: Header Idempotency-Key ausente ou payload inválido }
  /v1/checkouts/{checkoutId}:
    get:
      tags: [CheckoutService]
      summary: Consulta checkout
      parameters:
        - $ref: '#/components/parameters/CheckoutId'
      responses:
        '200': { description: Checkout encontrado }
        '404': { description: Checkout não encontrado }
  /v1/checkouts/{checkoutId}/confirm:
    post:
      tags: [CheckoutService]
      summary: Confirma checkout
      parameters:
        - $ref: '#/components/parameters/CheckoutId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Checkout confirmado }
        '400': { description: Header Idempotency-Key ausente ou payload inválido }

  /v1/shipping-promises:
    post:
      tags: [ShippingPromiseService]
      summary: Calcula promessa de entrega
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Promessa calculada }
        '400': { description: Request inválido }
  /v1/shipping-promises/{promiseId}:
    get:
      tags: [ShippingPromiseService]
      summary: Consulta promessa calculada
      parameters:
        - { name: promiseId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Promessa encontrada }
        '404': { description: Promessa não encontrada }

  /v1/products/logistics/batch:
    get:
      tags: [ProductCatalogService]
      summary: Consulta atributos logísticos de múltiplos SKUs
      parameters:
        - { name: skuIds, in: query, required: true, schema: { type: array, items: { type: string, format: uuid } }, style: form, explode: true }
      responses:
        '200': { description: Atributos logísticos retornados }
  /v1/products/:
    post:
      tags: [ProductCatalogService]
      summary: >-
        Cria um produto (dados comerciais + logísticos). Adicionado para
        openspec/changes/admin-backoffice; consumido pelo MarketplaceAdmin.Bff
        (POST /admin/products).
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Produto criado }
        '400': { description: Payload inválido (peso/dimensões <= 0, título/categoria ausentes) }
        '409': { description: SKU já existe }
  /v1/products/{skuId}:
    get:
      tags: [ProductCatalogService]
      summary: >-
        Consulta um produto por SKU (dados comerciais + logísticos). Adicionado
        para openspec/changes/admin-backoffice; consumido pelo
        MarketplaceAdmin.Bff (GET /admin/products/{skuId}).
      parameters:
        - $ref: '#/components/parameters/SkuId'
      responses:
        '200': { description: Produto encontrado }
        '404': { description: Produto não encontrado }
  /v1/products/{skuId}/logistics:
    get:
      tags: [ProductCatalogService]
      summary: Consulta atributos logísticos de um SKU
      parameters:
        - $ref: '#/components/parameters/SkuId'
      responses:
        '200': { description: SKU encontrado }
        '404': { description: SKU não encontrado }
    put:
      tags: [ProductCatalogService]
      summary: >-
        Atualiza os atributos logísticos de um SKU (peso, dimensões,
        frágil/restrito). Adicionado para openspec/changes/admin-backoffice;
        consumido pelo MarketplaceAdmin.Bff (PUT /admin/products/{skuId}/logistics).
      parameters:
        - $ref: '#/components/parameters/SkuId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Atributos logísticos atualizados }
        '400': { description: Peso/dimensões <= 0 }
        '404': { description: Produto não encontrado }
  /v1/products/{skuId}/status:
    patch:
      tags: [ProductCatalogService]
      summary: >-
        Altera o status de um produto (Draft/Active/Paused/Blocked/Deleted).
        Adicionado para openspec/changes/admin-backoffice; consumido pelo
        MarketplaceAdmin.Bff (PATCH /admin/products/{skuId}/status).
      parameters:
        - $ref: '#/components/parameters/SkuId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Status alterado }
        '400': { description: Status inválido }
        '404': { description: Produto não encontrado }

  /v1/inventory/availability/batch:
    post:
      tags: [InventoryService]
      summary: Consulta disponibilidade em lote
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Disponibilidade retornada }
  /v1/inventory/{sellerId}/{skuId}:
    get:
      tags: [InventoryService]
      summary: Consulta disponibilidade de SKU por seller
      parameters:
        - { name: sellerId, in: path, required: true, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/SkuId'
      responses:
        '200': { description: Disponibilidade retornada }
  /v1/inventory/reservations:
    post:
      tags: [InventoryService]
      summary: Cria reserva de estoque
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Reserva criada }
        '400': { description: Idempotency-Key ausente }
  /v1/inventory/reservations/{reservationId}/confirm:
    post:
      tags: [InventoryService]
      summary: Confirma reserva de estoque
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '200': { description: Reserva confirmada }
  /v1/inventory/reservations/{reservationId}/release:
    post:
      tags: [InventoryService]
      summary: Libera reserva de estoque
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '200': { description: Reserva liberada }
  /v1/inventory/:
    get:
      tags: [InventoryService]
      summary: >-
        Lista itens de estoque filtrando por sellerId/skuId/fulfillmentCenterId
        (todos opcionais). Adicionado para openspec/changes/admin-backoffice;
        consumido pelo MarketplaceAdmin.Bff (GET /admin/inventory).
      parameters:
        - { name: sellerId, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: skuId, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: fulfillmentCenterId, in: query, required: false, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Itens de estoque retornados }
  /v1/inventory/adjustments:
    post:
      tags: [InventoryService]
      summary: >-
        Ajusta estoque. Idempotente por Idempotency-Key desde
        openspec/changes/admin-backoffice (chave persistida em
        inventory.stock_movements; replays com a mesma chave não reaplicam o delta).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '202': { description: Ajuste aceito }
        '400': { description: Idempotency-Key ausente ou payload inválido (quantityDelta=0, ids ausentes) }

  /fulfillment-centers/candidates/search:
    post:
      tags: [FulfillmentCenterService]
      summary: Busca centros candidatos
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Centros candidatos }
  /fulfillment-centers/:
    post:
      tags: [FulfillmentCenterService]
      summary: >-
        Cria um fulfillment center. Adicionado para openspec/changes/admin-backoffice;
        consumido pelo MarketplaceAdmin.Bff (POST /admin/fulfillment-centers).
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Fulfillment center criado }
        '400': { description: Payload inválido (pesos máximos <= 0, code/timeZoneId ausentes) }
        '409': { description: Já existe um fulfillment center com este código }
    get:
      tags: [FulfillmentCenterService]
      summary: >-
        Lista fulfillment centers. Adicionado para openspec/changes/admin-backoffice.
      responses:
        '200': { description: Fulfillment centers retornados }
  /fulfillment-centers/{fulfillmentCenterId}:
    get:
      tags: [FulfillmentCenterService]
      summary: >-
        Consulta um fulfillment center por id. Adicionado para
        openspec/changes/admin-backoffice.
      parameters:
        - $ref: '#/components/parameters/FulfillmentCenterId'
      responses:
        '200': { description: Fulfillment center encontrado }
        '404': { description: Fulfillment center não encontrado }
  /fulfillment-centers/{fulfillmentCenterId}/capacity:
    get:
      tags: [FulfillmentCenterService]
      summary: >-
        Lista os slots de capacidade configurados para um fulfillment center.
        Adicionado para openspec/changes/admin-backoffice.
      parameters:
        - $ref: '#/components/parameters/FulfillmentCenterId'
      responses:
        '200': { description: Slots de capacidade retornados }
    put:
      tags: [FulfillmentCenterService]
      summary: Configura capacidade de fulfillment center
      parameters:
        - $ref: '#/components/parameters/FulfillmentCenterId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '204': { description: Capacidade configurada }
        '400': { description: Payload inválido }
        '404': { description: Fulfillment center não encontrado }
  /fulfillment-centers/{fulfillmentCenterId}/status:
    patch:
      tags: [FulfillmentCenterService]
      summary: Altera status de fulfillment center
      parameters:
        - $ref: '#/components/parameters/FulfillmentCenterId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '204': { description: Status alterado }
  /capacity-reservations/:
    post:
      tags: [FulfillmentCenterService]
      summary: Cria reserva de capacidade
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Reserva criada }
        '400': { description: Idempotency-Key ausente }
  /capacity-reservations/{reservationId}/confirm:
    post:
      tags: [FulfillmentCenterService]
      summary: Confirma reserva de capacidade
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '200': { description: Reserva confirmada }
  /capacity-reservations/{reservationId}/release:
    post:
      tags: [FulfillmentCenterService]
      summary: Libera reserva de capacidade
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '200': { description: Reserva liberada }

  /v1/routes/calculate:
    post:
      tags: [RoutingService]
      summary: Calcula rotas disponíveis
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Rotas calculadas }
        '400': { description: Request inválido }
        '503': { description: Grafo indisponível }
  /v1/routes/{routeId}:
    get:
      tags: [RoutingService]
      summary: Consulta rota calculada
      parameters:
        - { name: routeId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Rota encontrada }
        '404': { description: Rota não encontrada }

  /v1/routing/nodes:
    post:
      tags: [RoutingService]
      summary: >-
        Cria um nó logístico. Adicionado para openspec/changes/admin-backoffice;
        consumido pelo MarketplaceAdmin.Bff (POST /admin/network/nodes).
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Nó criado }
        '400': { description: Payload inválido (code/name/region/timeZoneId ausentes, handlingMinutes < 0) }
    get:
      tags: [RoutingService]
      summary: >-
        Lista nós logísticos, opcionalmente filtrando por region. Adicionado
        para openspec/changes/admin-backoffice.
      parameters:
        - { name: region, in: query, required: false, schema: { type: string } }
      responses:
        '200': { description: Nós retornados }
  /v1/routing/lanes:
    post:
      tags: [RoutingService]
      summary: >-
        Cria uma lane entre dois nós existentes. Adicionado para
        openspec/changes/admin-backoffice; consumido pelo MarketplaceAdmin.Bff
        (POST /admin/network/lanes).
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Lane criada }
        '400': { description: Payload inválido (origem/destino iguais, transitMinutes/pesos <= 0) }
        '404': { description: Nó de origem ou destino não encontrado }
    get:
      tags: [RoutingService]
      summary: Lista lanes. Adicionado para openspec/changes/admin-backoffice.
      responses:
        '200': { description: Lanes retornadas }
  /v1/routing/lanes/{laneId}:
    put:
      tags: [RoutingService]
      summary: >-
        Atualiza trânsito, pesos máximos e cronograma semanal de uma lane.
        Adicionado para openspec/changes/admin-backoffice.
      parameters:
        - { name: laneId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Lane atualizada }
        '400': { description: Payload inválido }
        '404': { description: Lane não encontrada }
  /v1/routing/lanes/{laneId}/status:
    patch:
      tags: [RoutingService]
      summary: >-
        Altera o status de uma lane (Active/Suspended/Maintenance/Inactive).
        Adicionado para openspec/changes/admin-backoffice.
      parameters:
        - { name: laneId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Status alterado }
        '404': { description: Lane não encontrada }

  /v1/carrier-availability/search:
    post:
      tags: [CarrierService]
      summary: Busca disponibilidade de transportadoras
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Disponibilidade retornada }
  /v1/carriers:
    post:
      tags: [CarrierService]
      summary: Cria carrier
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Carrier criado }
        '400': { description: Payload inválido (code/name ausentes) }
        '409': { description: Já existe um carrier com este código }
    get:
      tags: [CarrierService]
      summary: >-
        Lista carriers. Adicionado para openspec/changes/admin-backoffice;
        consumido pelo MarketplaceAdmin.Bff (GET /admin/carriers).
      responses:
        '200': { description: Carriers retornados }
  /v1/carriers/{carrierCode}:
    get:
      tags: [CarrierService]
      summary: Consulta carrier
      parameters:
        - $ref: '#/components/parameters/CarrierCode'
      responses:
        '200': { description: Carrier encontrado }
        '404': { description: Carrier não encontrado }
  /v1/carriers/{carrierCode}/status:
    patch:
      tags: [CarrierService]
      summary: Altera status do carrier
      parameters:
        - $ref: '#/components/parameters/CarrierCode'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '204': { description: Status alterado }
  /v1/carriers/{carrierCode}/webhooks/status:
    post:
      tags: [CarrierService]
      summary: Recebe webhook de status de carrier
      parameters:
        - $ref: '#/components/parameters/CarrierCode'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '202': { description: Webhook aceito }
  /v1/carriers/{carrierCode}/service-levels:
    post:
      tags: [CarrierService]
      summary: Cria service level de carrier
      parameters:
        - $ref: '#/components/parameters/CarrierCode'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Service level criado }
        '400': { description: Payload inválido (maximumWeightKg <= 0) }
        '404': { description: Carrier não encontrado }
    get:
      tags: [CarrierService]
      summary: >-
        Lista service levels de um carrier. Adicionado para
        openspec/changes/admin-backoffice.
      parameters:
        - $ref: '#/components/parameters/CarrierCode'
      responses:
        '200': { description: Service levels retornados }
        '404': { description: Carrier não encontrado }
  /v1/carriers/{carrierCode}/lanes:
    post:
      tags: [CarrierService]
      summary: Cria lane de carrier
      parameters:
        - $ref: '#/components/parameters/CarrierCode'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Lane criada }
        '400': { description: Payload inválido }
        '404': { description: Carrier ou service level não encontrado }
    get:
      tags: [CarrierService]
      summary: >-
        Lista lanes de um carrier (todas as service levels). Adicionado para
        openspec/changes/admin-backoffice.
      parameters:
        - $ref: '#/components/parameters/CarrierCode'
      responses:
        '200': { description: Lanes retornadas }
        '404': { description: Carrier não encontrado }

  /v1/pricing/freight:
    post:
      tags: [ShippingPricingService]
      summary: Calcula frete
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Frete calculado }
        '422': { description: Frete indisponível }
  /shipping-prices/quotes/batch:
    post:
      tags: [ShippingPricingService]
      summary: Calcula quotes em lote
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Quotes retornados }
  /shipping-prices/quotes/{quoteId}:
    get:
      tags: [ShippingPricingService]
      summary: Consulta quote de frete
      parameters:
        - { name: quoteId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Quote encontrado }
        '404': { description: Quote não encontrado }
  /rate-cards:
    post:
      tags: [ShippingPricingService]
      summary: Cria rate card
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Rate card criado }
        '400': { description: Payload inválido (sem bands, datas inválidas) }
    get:
      tags: [ShippingPricingService]
      summary: Lista rate cards. Adicionado para openspec/changes/admin-backoffice.
      responses:
        '200': { description: Rate cards retornados }
  /rate-cards/{rateCardId}:
    get:
      tags: [ShippingPricingService]
      summary: >-
        Consulta um rate card por id. Adicionado para
        openspec/changes/admin-backoffice.
      parameters:
        - { name: rateCardId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Rate card encontrado }
        '404': { description: Rate card não encontrado }
    put:
      tags: [ShippingPricingService]
      summary: Atualiza rate card
      parameters:
        - { name: rateCardId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Rate card atualizado }
        '400': { description: Payload inválido }
        '404': { description: Rate card não encontrado }
        '409': { description: Rate card não está em Draft }
  /rate-cards/{rateCardId}/activate:
    post:
      tags: [ShippingPricingService]
      summary: Ativa rate card
      parameters:
        - { name: rateCardId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Rate card ativado }
        '404': { description: Rate card não encontrado }
        '409': { description: Rate card não está em Draft }
  /rate-cards/{rateCardId}/retire:
    post:
      tags: [ShippingPricingService]
      summary: Aposenta rate card
      parameters:
        - { name: rateCardId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Rate card aposentado }
        '404': { description: Rate card não encontrado }
  /promotion-rules:
    get:
      tags: [ShippingPricingService]
      summary: >-
        Lista regras de subsídio/promoção. Adicionado para
        openspec/changes/admin-backoffice; consumido pelo MarketplaceAdmin.Bff
        (GET /admin/subsidy-rules).
      responses:
        '200': { description: Regras retornadas }
    post:
      tags: [ShippingPricingService]
      summary: >-
        Cria uma regra de subsídio/promoção. Adicionado para
        openspec/changes/admin-backoffice. Domínio interno: `PromotionRuleEntity`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '201': { description: Regra criada }
        '400': { description: Payload inválido (percentuais fora de 0-100 ou soma > 100) }
  /promotion-rules/{promotionId}/active:
    patch:
      tags: [ShippingPricingService]
      summary: >-
        Ativa ou desativa uma regra de subsídio/promoção. Adicionado para
        openspec/changes/admin-backoffice.
      parameters:
        - { name: promotionId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Regra atualizada }
        '404': { description: Regra não encontrada }

  /orders:
    get:
      tags: [OrderService]
      summary: >-
        Lista pedidos. Filtros sellerId/status adicionados para
        openspec/changes/admin-backoffice; consumido pelo MarketplaceAdmin.Bff
        (GET /admin/orders).
      parameters:
        - name: buyerId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: sellerId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        '200': { description: Lista de pedidos (filtrada por buyerId/sellerId/status quando informados) }
        '400': { description: Valor de status inválido }

  /orders/{orderId}:
    get:
      tags: [OrderService]
      summary: >-
        Consulta pedido. Consumido pelo MarketplaceAdmin.Bff
        (GET /admin/orders/{orderId}).
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200': { description: Pedido encontrado }
        '404': { description: Pedido não encontrado }
  /orders/{orderId}/cancel:
    post:
      tags: [OrderService]
      summary: >-
        Cancela pedido. Adicionado tratamento de KeyNotFoundException/404 e
        InvalidOperationException/409 (pedido Confirmed exige processo de
        devolução/reembolso) para openspec/changes/admin-backoffice; consumido
        pelo MarketplaceAdmin.Bff (POST /admin/orders/{orderId}/cancel).
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '202': { description: Cancelamento aceito }
        '400': { description: Idempotency-Key ausente }
        '404': { description: Pedido não encontrado }
        '409': { description: Pedido em estado terminal (ex. Confirmed) não pode ser cancelado por este fluxo }

  /shipments:
    get:
      tags: [ShipmentService]
      summary: >-
        Lista shipments (filtro opcional por orderId). Adicionado para
        openspec/changes/admin-backoffice; consumido pelo MarketplaceAdmin.Bff
        (GET /admin/shipments).
      parameters:
        - name: orderId
          in: query
          required: false
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Lista de shipments (filtrada por orderId quando informado) }

  /shipments/{shipmentId}:
    get:
      tags: [ShipmentService]
      summary: Consulta shipment
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200': { description: Shipment encontrado }
        '404': { description: Shipment não encontrado }
  /shipments/{shipmentId}/label:
    get:
      tags: [ShipmentService]
      summary: Consulta URL temporária da etiqueta
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200': { description: URL da etiqueta }
        '404': { description: Etiqueta não encontrada }
  /shipments/{shipmentId}/cancel:
    post:
      tags: [ShipmentService]
      summary: Solicita cancelamento de shipment
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202': { description: Cancelamento aceito }
        '400': { description: Idempotency-Key ausente }
        '404': { description: Shipment não encontrado }
        '409': { description: Estado inválido para cancelamento }

  /v1/tracking/{trackingCode}:
    get:
      tags: [TrackingService]
      summary: Consulta tracking por código
      parameters:
        - { name: trackingCode, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Tracking encontrado }
        '404': { description: Tracking não encontrado }
  /v1/tracking/shipments/{shipmentId}:
    get:
      tags: [TrackingService]
      summary: Consulta tracking por shipmentId
      parameters:
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200': { description: Tracking encontrado }
        '404': { description: Tracking não encontrado }
  /v1/tracking/events:
    post:
      tags: [TrackingService]
      summary: >-
        Recebe evento de tracking de carrier. Não valida existência do
        shipmentId em ShipmentService (fora do bounded context deste
        serviço) — para uso administrativo, o MarketplaceAdmin.Bff valida
        isso antes de encaminhar (POST /admin/tracking/events), gerando
        providerEventId/messageId já que eventos manuais não têm payload
        real de webhook de carrier.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '202': { description: Evento aceito }
        '400': { description: Evento inválido }

  /v1/notifications/{notificationId}:
    get:
      tags: [NotificationService]
      summary: Consulta notificação
      parameters:
        - { name: notificationId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Notificação encontrada }
        '404': { description: Notificação não encontrada }
  /v1/notifications/tracking-status-changed:
    post:
      tags: [NotificationService]
      summary: Planeja notificação a partir de mudança de tracking recebida por HTTP
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '202': { description: Evento aceito }
  /v1/notification-preferences/{recipientId}/{type}/{channel}:
    put:
      tags: [NotificationService]
      summary: Cria ou atualiza preferência de notificação
      parameters:
        - { name: recipientId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: type, in: path, required: true, schema: { type: string } }
        - { name: channel, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '204': { description: Preferência salva }
  /v1/providers/{provider}/receipts:
    post:
      tags: [NotificationService]
      summary: Recebe receipt de provider externo
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '202': { description: Receipt aceito }

components:
  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string }
    CheckoutId:
      name: checkoutId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SkuId:
      name: skuId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReservationId:
      name: reservationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    FulfillmentCenterId:
      name: fulfillmentCenterId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CarrierCode:
      name: carrierCode
      in: path
      required: true
      schema: { type: string }
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ShipmentId:
      name: shipmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
