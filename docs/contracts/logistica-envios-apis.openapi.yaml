openapi: 3.0.3
info:
  title: Logística Envios - API Contracts
  version: 1.0.0
  description: >-
    Contratos OpenAPI consolidados dos microservices da plataforma Logística Envios.
    Este arquivo é a visão canônica para integração entre Frontend/BFF e microservices.
    Autenticação via JWT Bearer (OAuth2 Client Credentials). Todos os endpoints exigem
    autorização exceto health checks, tracking público e webhooks de carriers/providers.
  contact:
    name: Logística Envios Platform Team
    email: plataforma-envios@logistica.internal

servers:
  - url: http://localhost
    description: Base local genérica; cada serviço possui sua própria porta no repositório correspondente.

security:
  - BearerAuth: []

tags:
  - name: Health
    description: Liveness e readiness probes para Kubernetes. Não requerem autenticação.
  - name: MarketplaceWeb.Bff
    description: BFF (Backend for Frontend) do canal web. Agrega dados de múltiplos microservices e serve o frontend React.
  - name: ProductSearchService
    description: Busca textual e por facetas de produtos. Mantém índice materializado atualizado via eventos Kafka.
  - name: ProductCatalogService
    description: Catálogo de produtos e atributos logísticos (dimensões, peso, restrições). Fonte de verdade para atributos físicos do SKU.
  - name: CheckoutService
    description: Sessões de checkout com idempotência. Orquestra cotação assíncrona de frete via Kafka e confirma o carrinho do comprador publicando checkout.confirmed.
  - name: ShippingPromiseService
    description: Calcula a promessa de entrega (prazo, modalidade, carrier, custo) consultando catálogo, estoque, fulfillment, roteamento, carrier e precificação.
  - name: InventoryService
    description: Gestão de saldo e reservas de estoque por seller e fulfillment center. Suporta reserva temporária, confirmação e liberação.
  - name: FulfillmentCenterService
    description: Capacidade operacional dos centros de fulfillment. Fornece centros candidatos e gerencia reservas de capacidade diária.
  - name: RoutingService
    description: Grafo logístico de nós e lanes. Calcula rotas disponíveis entre origem e destino considerando janelas de operação.
  - name: CarrierService
    description: Cadastro de transportadoras, níveis de serviço e disponibilidade real-time. Recebe webhooks de atualização de status.
  - name: ShippingPricingService
    description: Precificação de frete com subsídio e tabelas de preço (rate cards). Retorna preço ao cliente, custo logístico e subsídios aplicados.
  - name: OrderService
    description: Pedido confirmado. Consome checkout.confirmed, executa a saga de reservas e pagamento via Outbox Pattern, e publica order.created.
  - name: ShipmentService
    description: Remessa física (shipment), volumes, etiqueta e cancelamento. Criado a partir do evento order.created.
  - name: TrackingService
    description: Linha do tempo de tracking. Consulta pública por código de rastreio; consulta autenticada por shipmentId.
  - name: NotificationService
    description: Envio de notificações multicanal (Email, SMS, Push) e gerenciamento de preferências de destinatários.
  - name: AuditService
    description: Trilha de auditoria dos eventos funcionais e técnicos da plataforma. Somente leitura via API; escrita exclusivamente via Kafka.

paths:

  # ── Health ────────────────────────────────────────────────────────────────
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: healthLive
      security: []
      responses:
        '200':
          description: Serviço ativo
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: healthReady
      security: []
      responses:
        '200':
          description: Serviço pronto para receber tráfego
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
        '503':
          description: Serviço não disponível (dependências não prontas)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  # ── MarketplaceWeb BFF ─────────────────────────────────────────────────────
  /api/web/v1/products/search:
    get:
      tags: [MarketplaceWeb.Bff]
      summary: Busca produtos para o canal web via BFF
      operationId: bffSearchProducts
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/QueryText'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: zipCode
          in: query
          required: false
          schema: { type: string }
        - name: region
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Resultado paginado de produtos
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductSearchResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/products/{skuId}:
    get:
      tags: [MarketplaceWeb.Bff]
      summary: Consulta dados públicos de produto via BFF
      operationId: bffGetProduct
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SkuId'
      responses:
        '200':
          description: Produto encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/products/{skuId}/page:
    get:
      tags: [MarketplaceWeb.Bff]
      summary: Retorna payload composto para página de produto
      operationId: bffGetProductPage
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SkuId'
        - name: quantity
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 99, default: 1 }
        - name: zipCode
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Página de produto composta
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductPageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/shipping-promises:
    post:
      tags: [MarketplaceWeb.Bff]
      summary: Calcula promessa de frete via BFF
      operationId: bffCalculateShippingPromise
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShippingPromiseRequest' }
      responses:
        '200':
          description: Promessa calculada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShippingPromiseResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/checkouts:
    post:
      tags: [MarketplaceWeb.Bff]
      summary: Cria checkout via BFF
      operationId: bffCreateCheckout
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BffCreateCheckoutRequest' }
      responses:
        '201':
          description: Checkout criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BffCheckoutResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/checkouts/{checkoutId}:
    get:
      tags: [MarketplaceWeb.Bff]
      summary: Consulta checkout via BFF
      operationId: bffGetCheckout
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/CheckoutId'
      responses:
        '200':
          description: Checkout encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BffCheckoutResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/checkouts/{checkoutId}/confirm:
    post:
      tags: [MarketplaceWeb.Bff]
      summary: Confirma checkout via BFF
      operationId: bffConfirmCheckout
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/CheckoutId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BffConfirmCheckoutRequest' }
      responses:
        '200':
          description: Checkout confirmado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BffCheckoutResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/orders/{orderId}:
    get:
      tags: [MarketplaceWeb.Bff]
      summary: Retorna página composta do pedido
      operationId: bffGetOrderPage
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Página de pedido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderPageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/orders/{orderId}/cancel:
    post:
      tags: [MarketplaceWeb.Bff]
      summary: Cancela pedido via BFF
      operationId: bffCancelOrder
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CancelOrderRequest' }
      responses:
        '202': { description: Cancelamento aceito }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/orders/{orderId}/tracking:
    get:
      tags: [MarketplaceWeb.Bff]
      summary: Consulta tracking do pedido via BFF
      operationId: bffGetOrderTracking
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Tracking do pedido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrackingResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/web/v1/shipments/{shipmentId}/label:
    get:
      tags: [MarketplaceWeb.Bff]
      summary: Baixa etiqueta de expedição via BFF
      operationId: bffGetShipmentLabel
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200':
          description: URL temporária da etiqueta
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipmentLabelResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ── ProductSearchService ───────────────────────────────────────────────────
  /v1/products/search:
    get:
      tags: [ProductSearchService]
      summary: Busca textual de produtos no índice materializado
      operationId: searchProducts
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/QueryText'
        - $ref: '#/components/parameters/Page'
        - name: pageSize
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - name: zipCode
          in: query
          required: false
          schema: { type: string }
        - name: region
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Resultado de busca
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductSearchResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ── ProductCatalogService ──────────────────────────────────────────────────
  /v1/products:
    post:
      tags: [ProductCatalogService]
      summary: Cria produto/SKU
      operationId: createProduct
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProductRequest' }
      responses:
        '201':
          description: Produto criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/products/{skuId}:
    get:
      tags: [ProductCatalogService]
      summary: Consulta produto por SKU
      operationId: getProduct
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SkuId'
      responses:
        '200':
          description: Produto encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/products/physical-info/batch:
    post:
      tags: [ProductCatalogService]
      summary: Consulta informações físicas de SKUs em lote
      operationId: getProductPhysicalInfoBatch
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductPhysicalInfoBatchRequest' }
      responses:
        '200':
          description: Informações físicas encontradas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProductPhysicalInfoResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/products/{skuId}/physical-info:
    put:
      tags: [ProductCatalogService]
      summary: Atualiza informações físicas de SKU
      operationId: updateProductPhysicalInfo
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SkuId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProductPhysicalInfoRequest' }
      responses:
        '200':
          description: Produto atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/products/{skuId}/status:
    patch:
      tags: [ProductCatalogService]
      summary: Altera status de produto
      operationId: updateProductStatus
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SkuId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProductStatusRequest' }
      responses:
        '200':
          description: Produto atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ── CheckoutService ────────────────────────────────────────────────────────
  /v1/checkouts:
    post:
      tags: [CheckoutService]
      summary: Cria sessão de checkout
      operationId: createCheckout
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCheckoutRequest' }
      responses:
        '201':
          description: Checkout criado. Evento checkout.shipping.quote.requested publicado para cotação assíncrona.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CheckoutResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/checkouts/{checkoutId}:
    get:
      tags: [CheckoutService]
      summary: Consulta checkout
      operationId: getCheckout
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/CheckoutId'
      responses:
        '200':
          description: Checkout encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CheckoutResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/checkouts/{checkoutId}/shipping-options:
    get:
      tags: [CheckoutService]
      summary: Retorna opções de frete disponíveis para o checkout
      description: >-
        Retorna as opções de frete calculadas assincronamente. O CheckoutService
        consome o evento shipping.promise.calculated e persiste a ShippingPromiseProjection.
        Retorna lista vazia com quoteStatus=Pending enquanto a cotação ainda não chegou.
      operationId: getCheckoutShippingOptions
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/CheckoutId'
      responses:
        '200':
          description: Opções de frete (lista vazia se cotação ainda pendente)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShippingOptionsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/checkouts/{checkoutId}/confirm:
    post:
      tags: [CheckoutService]
      summary: Confirma checkout e publica checkout.confirmed
      operationId: confirmCheckout
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/CheckoutId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmCheckoutRequest' }
      responses:
        '200':
          description: Checkout confirmado. Evento checkout.confirmed publicado via Outbox.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CheckoutResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ── ShippingPromiseService ─────────────────────────────────────────────────
  /v1/shipping-promises:
    post:
      tags: [ShippingPromiseService]
      summary: Calcula promessa de entrega
      operationId: calculateShippingPromise
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShippingPromiseRequest' }
      responses:
        '200':
          description: Promessa calculada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShippingPromiseResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ── InventoryService ───────────────────────────────────────────────────────
  /v1/inventory/availability/batch:
    post:
      tags: [InventoryService]
      summary: Consulta disponibilidade em lote
      operationId: getInventoryAvailabilityBatch
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryAvailabilityBatchRequest' }
      responses:
        '200':
          description: Saldos encontrados
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InventoryAvailabilityResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/inventory/{sellerId}/{skuId}:
    get:
      tags: [InventoryService]
      summary: Consulta disponibilidade de SKU por seller
      operationId: getInventoryBySku
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/SellerId'
        - $ref: '#/components/parameters/SkuId'
      responses:
        '200':
          description: Saldos por fulfillment center
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InventoryAvailabilityResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
