  /v1/shipments/{shipmentId}:
    get:
      tags: [ShipmentService]
      summary: Consulta remessa
      operationId: getShipment
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200':
          description: Remessa encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipmentResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/shipments/{shipmentId}/label:
    get:
      tags: [ShipmentService]
      summary: Gera URL temporária para etiqueta
      operationId: getShipmentLabel
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200':
          description: URL temporária gerada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipmentLabelResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/shipments/{shipmentId}/cancel:
    post:
      tags: [ShipmentService]
      summary: Solicita cancelamento de remessa
      operationId: cancelShipment
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ShipmentId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202': { description: Cancelamento aceito }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ── TrackingService ────────────────────────────────────────────────────────
  /v1/tracking/shipments/{shipmentId}:
    get:
      tags: [TrackingService]
      summary: Consulta tracking por shipmentId
      operationId: getTrackingByShipment
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ShipmentId'
      responses:
        '200':
          description: Tracking encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrackingResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/tracking/{trackingCode}:
    get:
      tags: [TrackingService]
      summary: Consulta tracking por código de rastreio (endpoint público)
      operationId: getTrackingByCode
      security: []
      parameters:
        - name: trackingCode
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tracking encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrackingResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/tracking/shipments/{shipmentId}/events:
    get:
      tags: [TrackingService]
      summary: Consulta histórico de eventos de tracking
      operationId: getTrackingEvents
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/ShipmentId'
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: before
          in: query
          required: false
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Eventos de tracking
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TrackingEventResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ── NotificationService ────────────────────────────────────────────────────
  /v1/notifications/{notificationId}:
    get:
      tags: [NotificationService]
      summary: Consulta notificação
      operationId: getNotification
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: notificationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Notificação encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/notifications/tracking-status-changed:
    post:
      tags: [NotificationService]
      summary: Recebe evento de alteração de tracking
      operationId: receiveTrackingStatusChanged
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrackingStatusChangedEvent' }
      responses:
        '202': { description: Evento aceito }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/notification-preferences/{recipientId}/{type}/{channel}:
    put:
      tags: [NotificationService]
      summary: Cria ou atualiza preferência de notificação
      operationId: upsertNotificationPreference
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: recipientId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: type
          in: path
          required: true
          schema: { type: string }
        - name: channel
          in: path
          required: true
          schema: { type: string, enum: [Email, Sms, Push] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        '204': { description: Preferência atualizada }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/providers/{provider}/receipts:
    post:
      tags: [NotificationService]
      summary: Recebe receipt de provider de notificação
      operationId: receiveProviderReceipt
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProviderReceiptRequest' }
      responses:
        '202': { description: Receipt aceito }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ── AuditService ───────────────────────────────────────────────────────────
  /v1/audit/events:
    get:
      tags: [AuditService]
      summary: Lista eventos de auditoria com filtros
      operationId: listAuditEvents
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: entityType
          in: query
          required: false
          description: Tipo da entidade auditada (ex. Order, Checkout, Shipment)
          schema: { type: string }
        - name: entityId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: actorId
          in: query
          required: false
          schema: { type: string }
        - name: eventType
          in: query
          required: false
          schema: { type: string }
        - name: from
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: to
          in: query
          required: false
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Eventos de auditoria
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEventResponse' }
                  pagination:
                    type: object
                    properties:
                      page: { type: integer }
                      pageSize: { type: integer }
                      total: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /v1/audit/events/{auditEventId}:
    get:
      tags: [AuditService]
      summary: Consulta evento de auditoria por ID
      operationId: getAuditEvent
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: auditEventId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Evento de auditoria encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditEventResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JWT emitido pelo Authorization Service via OAuth2 Client Credentials (M2M).
        Escopos exigidos variam por operação (ex. envios:read, envios:write, audit:read).
        Header: Authorization: Bearer <token>

  parameters:
    IdempotencyKey:
      name: x-idempotency-key
      in: header
      required: true
      description: Chave de idempotência para operações de escrita. UUID v4 recomendado.
      schema: { type: string, format: uuid }
    CorrelationId:
      name: x-correlation-id
      in: header
      required: false
      description: ID de correlação para rastreio distribuído. Gerado pelo caller se ausente.
      schema: { type: string, format: uuid }
    QueryText:
      name: query
      in: query
      required: true
      schema: { type: string, minLength: 1 }
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    SkuId:
      name: skuId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SellerId:
      name: sellerId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CheckoutId:
      name: checkoutId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ShipmentId:
      name: shipmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReservationId:
      name: reservationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    FulfillmentCenterId:
      name: fulfillmentCenterId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CarrierCode:
      name: carrierCode
      in: path
      required: true
      schema: { type: string }

  responses:
    BadRequest:
      description: Requisição inválida — parâmetros ou corpo com formato incorreto
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Token ausente, expirado ou inválido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Token válido mas sem permissão para o recurso solicitado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflito de estado — recurso já existe ou transição de status inválida
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnprocessableEntity:
      description: Dados sintaticamente corretos mas semanticamente inválidos
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    InternalServerError:
      description: Erro interno do servidor
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Código de erro da aplicação
          example: CHECKOUT_NOT_FOUND
        message:
          type: string
          description: Mensagem legível ao desenvolvedor
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
        correlationId: { type: string, format: uuid }
        traceId: { type: string }

    HealthResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [Healthy, Degraded, Unhealthy] }
        checks:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              status: { type: string, enum: [Healthy, Degraded, Unhealthy] }
              description: { type: string, nullable: true }
              durationMs: { type: integer }

    Address:
      type: object
      required: [zipCode, city, state, country]
      properties:
        zipCode: { type: string }
        city: { type: string }
        state: { type: string }
        country: { type: string, example: BR }

    Dimensions:
      type: object
      required: [heightCm, widthCm, lengthCm]
      properties:
        heightCm: { type: number, format: double, minimum: 0 }
        widthCm: { type: number, format: double, minimum: 0 }
        lengthCm: { type: number, format: double, minimum: 0 }

    PackageProfile:
      type: object
      properties:
        weightKg: { type: number, format: double }
        cubicWeightKg: { type: number, format: double }
        actualWeightKg: { type: number, format: double }
        totalWeightKg: { type: number, format: double }
        heightCm: { type: number, format: double }
        widthCm: { type: number, format: double }
        lengthCm: { type: number, format: double }
        isFragile: { type: boolean }
        isRestricted: { type: boolean }
        hasFragileItem: { type: boolean }
        hasRestrictedItem: { type: boolean }
        category: { type: string, nullable: true }

    ProductCardResponse:
      type: object
      properties:
        productId: { type: string }
        title: { type: string }
        imageUrl: { type: string, format: uri }
        price: { type: number, format: double }
        sellerId: { type: string }
        availableQuantity: { type: integer }
        rating: { type: number, format: double, nullable: true }
        freeShipping: { type: boolean }
        fulfillment: { type: boolean }
        shippingPromise: { type: string, nullable: true }

    ProductSearchResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ProductCardResponse' }
        pagination:
          type: object
          properties:
            page: { type: integer }
            pageSize: { type: integer }
            total: { type: integer }

    CreateProductRequest:
      type: object
      required: [sellerId, skuId, title, category, price, dimensions, weightKg]
      properties:
        sellerId: { type: string, format: uuid }
        skuId: { type: string, format: uuid }
        title: { type: string }
        category: { type: string }
        price: { type: number, format: double }
        dimensions: { $ref: '#/components/schemas/Dimensions' }
        weightKg: { type: number, format: double }
        isFragile: { type: boolean, default: false }
        isRestricted: { type: boolean, default: false }

    ProductResponse:
      type: object
      properties:
        skuId: { type: string, format: uuid }
        sellerId: { type: string, format: uuid }
        title: { type: string }
        category: { type: string }
        price: { type: number, format: double }
        status: { type: string, enum: [Draft, Active, Paused, Blocked, Deleted] }
        weightKg: { type: number, format: double }
        heightCm: { type: number, format: double }
        widthCm: { type: number, format: double }
        lengthCm: { type: number, format: double }
        isFragile: { type: boolean }
        isRestricted: { type: boolean }
        availableForSale: { type: boolean }

    ProductPhysicalInfoBatchRequest:
      type: object
      required: [skuIds]
      properties:
        skuIds:
          type: array
          minItems: 1
          maxItems: 100
          items: { type: string, format: uuid }

    ProductPhysicalInfoResponse:
      type: object
      properties:
        skuId: { type: string, format: uuid }
        sellerId: { type: string, format: uuid }
        weightKg: { type: number, format: double }
        heightCm: { type: number, format: double }
        widthCm: { type: number, format: double }
        lengthCm: { type: number, format: double }
        category: { type: string }
        isFragile: { type: boolean }
        isRestricted: { type: boolean }
        status: { type: string, enum: [Draft, Active, Paused, Blocked, Deleted] }

    UpdateProductPhysicalInfoRequest:
      type: object
      required: [weightKg, dimensions]
      properties:
        weightKg: { type: number, format: double }
        dimensions: { $ref: '#/components/schemas/Dimensions' }
        isFragile: { type: boolean }
        isRestricted: { type: boolean }

    UpdateProductStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [Draft, Active, Paused, Blocked, Deleted] }

    CheckoutItemRequest:
      type: object
      required: [skuId, quantity]
      properties:
        skuId: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { type: number, format: double }

    CreateCheckoutRequest:
      type: object
      required: [buyerId, sellerId, shippingAddress, items]
      properties:
        buyerId: { type: string, format: uuid }
        sellerId: { type: string, format: uuid }
        shippingAddress: { $ref: '#/components/schemas/Address' }
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/CheckoutItemRequest' }

    BffCreateCheckoutRequest:
      allOf:
        - $ref: '#/components/schemas/CreateCheckoutRequest'
        - type: object
          properties:
            paymentMethodId: { type: string }

    ConfirmCheckoutRequest:
      type: object
      required: [paymentIntentId]
      properties:
        paymentIntentId: { type: string }
        selectedPromiseId: { type: string, nullable: true }

    BffConfirmCheckoutRequest:
      type: object
      properties:
        paymentToken: { type: string }
        promiseId: { type: string }

    ShippingOption:
      type: object
      properties:
        promiseId: { type: string, nullable: true }
        mode:
          type: string
          nullable: true
          enum: [FULFILLMENT, FLEX, CROSSDOCKING, SELLERSHIPPING, CARRIER, null]
        carrier: { type: string, nullable: true }
        estimatedDeliveryDate: { type: string, format: date, nullable: true }
        cost: { type: number, format: double, nullable: true }
        label: { type: string, nullable: true }

    ShippingOptionsResponse:
      type: object
      properties:
        checkoutId: { type: string, format: uuid }
        quoteStatus:
          type: string
          enum: [Pending, Calculated, Failed]
          description: Pending enquanto o evento shipping.promise.calculated ainda não chegou
        options:
          type: array
          items: { $ref: '#/components/schemas/ShippingOption' }
        calculatedAt: { type: string, format: date-time, nullable: true }

    CheckoutResponse:
      type: object
      properties:
        checkoutId: { type: string, format: uuid }
        status: { type: string, enum: [Created, Confirmed, Expired, Cancelled] }
        itemsTotal: { type: number, format: double }
        shippingCost: { type: number, format: double }
        totalAmount: { type: number, format: double }
        shippingOption: { $ref: '#/components/schemas/ShippingOption' }
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    BffCheckoutResponse:
      type: object
      properties:
        checkoutId: { type: string, format: uuid }
        status: { type: string, enum: [Created, Confirmed, Expired, Cancelled] }
        itemsTotal: { type: number, format: double }
        shippingPrice: { type: number, format: double }
        totalAmount: { type: number, format: double }
        currency: { type: string, example: BRL }
        selectedShipping: { $ref: '#/components/schemas/ShippingOption' }
        items:
          type: array
          items: { $ref: '#/components/schemas/CheckoutItemRequest' }
        expiresAt: { type: string, format: date-time }

    ShippingPromiseItem:
      type: object
      required: [skuId, quantity, unitPrice]
      properties:
        skuId: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { type: number, format: double }

    ShippingPromiseRequest:
      type: object
      required: [buyerId, sellerId, destination, items]
      properties:
        buyerId: { type: string, format: uuid }
        sellerId: { type: string, format: uuid }
        destination: { $ref: '#/components/schemas/Address' }
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/ShippingPromiseItem' }

    ShippingPromiseResponse:
      type: object
      properties:
        available: { type: boolean }
        promiseId: { type: string, nullable: true }
        mode:
          type: string
          nullable: true
          enum: [FULFILLMENT, FLEX, CROSSDOCKING, SELLERSHIPPING, CARRIER, null]
        carrier: { type: string, nullable: true }
        estimatedDeliveryDate: { type: string, format: date, nullable: true }
        cost: { type: number, format: double, nullable: true }
        source: { type: string, enum: [Calculated, Cache, Fallback] }
        unavailableReason: { type: string, nullable: true }

    InventoryAvailabilityBatchRequest:
      type: object
      required: [sellerId, skuIds]
      properties:
        sellerId: { type: string, format: uuid }
        skuIds:
          type: array
          minItems: 1
          maxItems: 100
          items: { type: string, format: uuid }

    InventoryAvailabilityResponse:
      type: object
      properties:
        sellerId: { type: string, format: uuid }
        skuId: { type: string, format: uuid }
        fulfillmentCenterId: { type: string, format: uuid }
        onHandQuantity: { type: integer }
        reservedQuantity: { type: integer }
        availableQuantity: { type: integer }

    CreateInventoryReservationRequest:
      type: object
      required: [checkoutId, sellerId, items]
      properties:
        checkoutId: { type: string, format: uuid }
        sellerId: { type: string, format: uuid }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [skuId, fulfillmentCenterId, quantity]
            properties:
              skuId: { type: string, format: uuid }
              fulfillmentCenterId: { type: string, format: uuid }
              quantity: { type: integer, minimum: 1 }

    InventoryReservationResponse:
      type: object
      properties:
        reservationId: { type: string, format: uuid }
        checkoutId: { type: string, format: uuid }
        sellerId: { type: string, format: uuid }
        status: { type: string, enum: [Pending, Confirmed, Released, Expired] }
        expiresAt: { type: string, format: date-time }
        items:
          type: array
          items:
            type: object
            properties:
              skuId: { type: string, format: uuid }
              fulfillmentCenterId: { type: string, format: uuid }
              quantity: { type: integer }

    InventoryAdjustmentRequest:
      type: object
      required: [sellerId, skuId, fulfillmentCenterId, quantityDelta, reason]
      properties:
        sellerId: { type: string, format: uuid }
        skuId: { type: string, format: uuid }
        fulfillmentCenterId: { type: string, format: uuid }
        quantityDelta: { type: integer }
        reason: { type: string }

    FulfillmentCandidatesRequest:
      type: object
      required: [sellerId, destinationPostalCode, mode, package]
      properties:
        sellerId: { type: string, format: uuid }
        destinationPostalCode: { type: string }
        mode: { type: string, enum: [FULFILLMENT, FLEX, CROSSDOCKING, SELLERSHIPPING, CARRIER] }
        package: { $ref: '#/components/schemas/PackageProfile' }
        requestedAtUtc: { type: string, format: date-time }

    FulfillmentCandidateResponse:
      type: object
      properties:
        fulfillmentCenterId: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        region: { type: string }
        mode: { type: string }
        processingDate: { type: string, format: date }
        cutoffAt: { type: string, format: date-time }
        availableCapacityUnits: { type: integer }
        utilizationPercentage: { type: number }
        score: { type: number }

    UpdateFulfillmentCapacityRequest:
      type: object
      required: [operationDate, mode, totalCapacityUnits]
      properties:
        operationDate: { type: string, format: date }
        mode: { type: string }
        totalCapacityUnits: { type: integer, minimum: 0 }

    UpdateFulfillmentStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [Active, Suspended, Maintenance] }
        reason: { type: string }

    CreateCapacityReservationRequest:
      type: object
      required: [orderId, fulfillmentCenterId, operationDate, mode, requiredCapacityUnits]
      properties:
        orderId: { type: string, format: uuid }
        fulfillmentCenterId: { type: string, format: uuid }
        operationDate: { type: string, format: date }
        mode: { type: string }
        requiredCapacityUnits: { type: integer, minimum: 1 }

    CapacityReservationResponse:
      type: object
      properties:
        reservationId: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        fulfillmentCenterId: { type: string, format: uuid }
        operationDate: { type: string, format: date }
        mode: { type: string }
        reservedCapacityUnits: { type: integer }
        status: { type: string, enum: [Pending, Confirmed, Released, Expired] }
        expiresAt: { type: string, format: date-time }

    RouteSearchRequest:
      type: object
      required: [originNodeId, destinationPostalCode, package]
      properties:
        originNodeId: { type: string, format: uuid }
        destinationPostalCode: { type: string }
        package: { $ref: '#/components/schemas/PackageProfile' }
        requestedAtUtc: { type: string, format: date-time }
        maxOptions: { type: integer, minimum: 1, maximum: 5, default: 3 }

    RouteSearchResponse:
      type: object
      properties:
        networkVersion: { type: integer }
        source: { type: string, enum: [Cache, Live] }
        routes:
          type: array
          items:
            type: object
            properties:
              routeId: { type: string }
              originNodeId: { type: string, format: uuid }
              destinationNodeId: { type: string, format: uuid }
              estimatedDepartureAt: { type: string, format: date-time }
              estimatedArrivalAt: { type: string, format: date-time }
              totalElapsedMinutes: { type: integer }
              legs:
                type: array
                items:
                  type: object
                  properties:
                    laneId: { type: string, format: uuid }
                    originNodeId: { type: string, format: uuid }
                    originCode: { type: string }
                    destinationNodeId: { type: string, format: uuid }
                    destinationCode: { type: string }
                    carrierCode: { type: string }
                    mode: { type: string }
                    departureAt: { type: string, format: date-time }
                    arrivalAt: { type: string, format: date-time }
                    transitMinutes: { type: integer }

    CreateLogisticsNodeRequest:
      type: object
      required: [code, name, region, timeZoneId, type, handlingMinutes]
      properties:
        code: { type: string }
        name: { type: string }
        region: { type: string }
        timeZoneId: { type: string }
        type: { type: string, enum: [FC, HUB, CROSSDOCK, AGENCY] }
        handlingMinutes: { type: integer, minimum: 0 }

    CreateLogisticsLaneRequest:
      type: object
      required: [originNodeId, destinationNodeId, carrierCode, mode, transitMinutes, region]
      properties:
        originNodeId: { type: string, format: uuid }
        destinationNodeId: { type: string, format: uuid }
        carrierCode: { type: string }
        mode: { type: string }
        transitMinutes: { type: integer, minimum: 1 }
        maximumWeightKg: { type: number }
        maximumCubicWeightKg: { type: number }
        supportsFragileItems: { type: boolean }
        supportsRestrictedItems: { type: boolean }
        region: { type: string }
        schedules:
          type: array
          items:
            type: object
            properties:
              dayOfWeek: { type: string, enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday] }
              departureTime: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
              isActive: { type: boolean }

    UpdateLogisticsLaneRequest:
      allOf:
        - $ref: '#/components/schemas/CreateLogisticsLaneRequest'

    CreateCarrierRequest:
      type: object
      required: [code, name, requiresRealTimeValidation]
      properties:
        code: { type: string }
        name: { type: string }
        requiresRealTimeValidation: { type: boolean }

    CarrierProfileResponse:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        status: { type: string, enum: [Active, Degraded, Suspended, Maintenance, Inactive] }
        requiresRealTimeValidation: { type: boolean }

    UpdateCarrierStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [Active, Degraded, Suspended, Maintenance, Inactive] }
        reason: { type: string }

    CarrierStatusWebhookRequest:
      type: object
      required: [eventId, status, occurredAt]
      properties:
        eventId: { type: string }
        status: { type: string }
        reason: { type: string }
        occurredAt: { type: string, format: date-time }
        signature: { type: string }

    CreateCarrierServiceLevelRequest:
      type: object
      required: [code, name, mode, maximumWeightKg, maximumCubicWeightKg]
      properties:
        code: { type: string }
        name: { type: string }
        mode: { type: string, enum: [FULFILLMENT, FLEX, CROSSDOCKING, SELLERSHIPPING, CARRIER] }
        maximumWeightKg: { type: number, minimum: 0 }
        maximumCubicWeightKg: { type: number, minimum: 0 }
        supportsFragileItems: { type: boolean }
        supportsRestrictedItems: { type: boolean }
        priority: { type: integer, minimum: 1 }

    CreateCarrierLaneRequest:
      type: object
      required: [serviceLevelCode, originNodeId, destinationNodeId, timeZoneId, cutoffTime, operatingDays]
      properties:
        serviceLevelCode: { type: string }
        originNodeId: { type: string, format: uuid }
        destinationNodeId: { type: string, format: uuid }
        timeZoneId: { type: string }
        cutoffTime: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
        operatingDays:
          type: array
          minItems: 1
          items: { type: string, enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday] }

    CarrierAvailabilitySearchRequest:
      type: object
      required: [checks]
      properties:
        checks:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: object
            required: [checkId, carrierCode, serviceLevelCode, originNodeId, destinationNodeId, destinationPostalCode, plannedDepartureAtUtc, package]
            properties:
              checkId: { type: string }
              carrierCode: { type: string }
              serviceLevelCode: { type: string }
              originNodeId: { type: string, format: uuid }
              destinationNodeId: { type: string, format: uuid }
              destinationPostalCode: { type: string }
              plannedDepartureAtUtc: { type: string, format: date-time }
              package: { $ref: '#/components/schemas/PackageProfile' }

    CarrierAvailabilitySearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              checkId: { type: string }
              carrierCode: { type: string }
              serviceLevelCode: { type: string }
              available: { type: boolean }
              reasonCode: { type: string, nullable: true }
              source: { type: string, enum: [Local, External] }
              evaluatedAt: { type: string, format: date-time }
              validUntil: { type: string, format: date-time }

    BatchShippingPriceRequest:
      type: object
      required: [buyerId, sellerId, destinationPostalCode, cartTotal, currency, candidates]
      properties:
        buyerId: { type: string, format: uuid }
        sellerId: { type: string, format: uuid }
        destinationPostalCode: { type: string }
        cartTotal: { type: number, format: double }
        currency: { type: string, example: BRL }
        requestedAtUtc: { type: string, format: date-time }
        candidates:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: object
            required: [candidateId, routeId, originNodeId, carrierCode, serviceLevelCode, package]
            properties:
              candidateId: { type: string }
              routeId: { type: string }
              originNodeId: { type: string, format: uuid }
              carrierCode: { type: string }
              serviceLevelCode: { type: string }
              package: { $ref: '#/components/schemas/PackageProfile' }

    ShippingPriceQuoteResponse:
      type: object
      properties:
        candidateId: { type: string }
        available: { type: boolean }
        quoteId: { type: string, format: uuid, nullable: true }
        routeId: { type: string }
        currency: { type: string }
        chargeableWeightKg: { type: number, nullable: true }
        logisticsCost: { type: number, nullable: true }
        customerPrice: { type: number, nullable: true }
        platformSubsidy: { type: number, nullable: true }
        sellerSubsidy: { type: number, nullable: true }
        discount: { type: number, nullable: true }
        adjustments:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              description: { type: string }
              type: { type: string, enum: [Subsidy, Surcharge, Discount] }
              amount: { type: number }
        rateCardVersion: { type: integer, nullable: true }
        source: { type: string, enum: [Calculated, Cache] }
        expiresAt: { type: string, format: date-time, nullable: true }
        unavailableReason: { type: string, nullable: true }

    BatchShippingPriceResponse:
      type: object
      properties:
        quotes:
          type: array
          items: { $ref: '#/components/schemas/ShippingPriceQuoteResponse' }

    RateCardRequest:
      type: object
      required: [carrierCode, serviceLevelCode, region, validFrom, bands]
      properties:
        carrierCode: { type: string }
        serviceLevelCode: { type: string }
        region: { type: string }
        currency: { type: string, default: BRL }
        validFrom: { type: string, format: date }
        validUntil: { type: string, format: date, nullable: true }
        bands:
          type: array
          minItems: 1
          items:
            type: object
            required: [weightUpToKg, pricePerKg, minimumPrice]
            properties:
              weightUpToKg: { type: number, minimum: 0 }
              pricePerKg: { type: number, minimum: 0 }
              minimumPrice: { type: number, minimum: 0 }
              surcharges:
                type: array
                items:
                  type: object
                  properties:
                    code: { type: string }
                    type: { type: string, enum: [Percentage, Fixed] }
                    value: { type: number }

    RateCardResponse:
      allOf:
        - $ref: '#/components/schemas/RateCardRequest'
        - type: object
          required: [rateCardId, version, status, createdAt]
          properties:
            rateCardId: { type: string, format: uuid }
            version: { type: integer }
            status: { type: string, enum: [Draft, Active, Retired] }
            createdAt: { type: string, format: date-time }
            activatedAt: { type: string, format: date-time, nullable: true }
            retiredAt: { type: string, format: date-time, nullable: true }

    CreateOrderRequest:
      type: object
      required: [checkoutId, buyerId, sellerId, shippingPromiseId, pricingQuoteId, items, totalAmount, currency]
      properties:
        checkoutId: { type: string, format: uuid }
        buyerId: { type: string, format: uuid }
        sellerId: { type: string, format: uuid }
        shippingPromiseId: { type: string }
        pricingQuoteId: { type: string, format: uuid }
        shippingAddress: { $ref: '#/components/schemas/Address' }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [skuId, quantity, unitPrice]
            properties:
              skuId: { type: string, format: uuid }
              title: { type: string }
              quantity: { type: integer, minimum: 1 }
              unitPrice: { type: number, format: double }
        itemsTotal: { type: number, format: double }
        shippingPrice: { type: number, format: double }
        totalAmount: { type: number, format: double }
        currency: { type: string, example: BRL }

    OrderResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        checkoutId: { type: string, format: uuid }
        buyerId: { type: string, format: uuid }
        sellerId: { type: string, format: uuid }
        status:
          type: string
          enum: [PendingReservations, ReservationsConfirmed, PendingPayment, PaymentAuthorized, Confirmed, CancellationRequested, Cancelled]
        currency: { type: string }
        itemsTotal: { type: number }
        shippingPrice: { type: number }
        totalAmount: { type: number }
        shippingPromiseId: { type: string }
        pricingQuoteId: { type: string, format: uuid }
        inventoryReservationId: { type: string, format: uuid, nullable: true }
        capacityReservationId: { type: string, format: uuid, nullable: true }
        paymentAuthorizationId: { type: string, format: uuid, nullable: true }
        shipmentId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        confirmedAt: { type: string, format: date-time, nullable: true }
        cancelledAt: { type: string, format: date-time, nullable: true }
        items:
          type: array
          items:
            type: object
            properties:
              skuId: { type: string, format: uuid }
              title: { type: string }
              quantity: { type: integer }
              unitPrice: { type: number }
              totalPrice: { type: number }

    CancelOrderRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }
        detail: { type: string, nullable: true }

    ShipmentResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        status:
          type: string
          enum: [Created, ReadyToPickup, InTransit, OutForDelivery, Delivered, DeliveryException, Cancelled]
        carrierCode: { type: string }
        serviceLevelCode: { type: string }
        trackingCode: { type: string }
        promisedDeliveryDate: { type: string, format: date }
        createdAt: { type: string, format: date-time }
        readyAt: { type: string, format: date-time, nullable: true }
        packages:
          type: array
          items:
            type: object
            properties:
              sequence: { type: integer }
              weightKg: { type: number }
              heightCm: { type: number }
              widthCm: { type: number }
              lengthCm: { type: number }
              items:
                type: array
                items:
                  type: object
                  properties:
                    skuId: { type: string, format: uuid }
                    quantity: { type: integer }

    ShipmentLabelResponse:
      type: object
      required: [url, expiresInSeconds]
      properties:
        url: { type: string, format: uri }
        expiresInSeconds: { type: integer }

    TrackingLocation:
      type: object
      properties:
        facilityCode: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        country: { type: string, nullable: true }

    TrackingResponse:
      type: object
      properties:
        shipmentId: { type: string, format: uuid }
        trackingCode: { type: string }
        carrierCode: { type: string }
        currentStatus: { type: string }
        lastLocation: { $ref: '#/components/schemas/TrackingLocation' }
        lastEventOccurredAt: { type: string, format: date-time }
        estimatedDeliveryDate: { type: string, format: date, nullable: true }
        deliveredAt: { type: string, format: date-time, nullable: true }
        currentExceptionCode: { type: string, nullable: true }

    TrackingEventResponse:
      type: object
      properties:
        eventId: { type: string, format: uuid }
        status: { type: string }
        description: { type: string }
        exceptionCode: { type: string, nullable: true }
        location: { $ref: '#/components/schemas/TrackingLocation' }
        occurredAt: { type: string, format: date-time }
        receivedAt: { type: string, format: date-time }

    TrackingStatusChangedEvent:
      type: object
      required: [messageId, shipmentId, buyerId, trackingCode, currentStatus, occurredAt]
      properties:
        messageId: { type: string, format: uuid }
        shipmentId: { type: string, format: uuid }
        buyerId: { type: string, format: uuid }
        trackingCode: { type: string }
        currentStatus: { type: string }
        occurredAt: { type: string, format: date-time }
        estimatedDeliveryDate: { type: string, format: date, nullable: true }
        exceptionCode: { type: string, nullable: true }

    NotificationResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        recipientId: { type: string, format: uuid }
        type: { type: string }
        status: { type: string, enum: [Pending, Processing, Delivered, Failed, Cancelled] }
        priority: { type: integer }
        createdAt: { type: string, format: date-time }
        deliveries:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              channel: { type: string, enum: [Email, Sms, Push] }
              status: { type: string }
              templateVersion: { type: integer }
              attempts: { type: integer }
              acceptedAt: { type: string, format: date-time, nullable: true }
              deliveredAt: { type: string, format: date-time, nullable: true }
              destination: { type: string }

    ProviderReceiptRequest:
      type: object
      required: [providerEventId, providerMessageId, status, occurredAt]
      properties:
        providerEventId: { type: string }
        providerMessageId: { type: string }
        status: { type: string, enum: [Delivered, Bounced, Failed] }
        occurredAt: { type: string, format: date-time }
        signature: { type: string }

    AuditEventResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        entityType: { type: string, description: Tipo da entidade auditada (ex. Order, Checkout, Shipment) }
        entityId: { type: string, format: uuid }
        eventType: { type: string, description: Tipo do evento (ex. OrderCreated, CheckoutConfirmed) }
        actorId: { type: string, nullable: true }
        actorType: { type: string, enum: [User, Service, System], nullable: true }
        payload:
          type: object
          additionalProperties: true
          nullable: true
        correlationId: { type: string, format: uuid, nullable: true }
        traceId: { type: string, nullable: true }
        occurredAt: { type: string, format: date-time }
        persistedAt: { type: string, format: date-time }

    ProductPageResponse:
      type: object
      properties:
        product: { $ref: '#/components/schemas/ProductResponse' }
        shipping: { $ref: '#/components/schemas/ShippingPromiseResponse' }
        warnings:
          type: array
          items: { type: string }

    OrderPageResponse:
      type: object
      properties:
        order: { $ref: '#/components/schemas/OrderResponse' }
        shipment: { $ref: '#/components/schemas/ShipmentResponse' }
        tracking: { $ref: '#/components/schemas/TrackingResponse' }
        warnings:
          type: array
          items: { type: string }
