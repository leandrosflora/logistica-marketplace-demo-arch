openapi: 3.0.3
info:
  title: Shipping Promise API
  version: 1.0.0
  description: API responsável por calcular promessa de entrega, disponibilidade e preço de frete.
servers:
  - url: http://localhost:5001
paths:
  /v1/shipping-promises/quote:
    post:
      summary: Calcula promessa de entrega para itens de checkout
      operationId: quoteShippingPromise
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
        - name: x-idempotency-key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '200':
          description: Promessa calculada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '422':
          description: Entrada inválida ou produto indisponível
        '503':
          description: Dependência logística indisponível
components:
  schemas:
    QuoteRequest:
      type: object
      required:
        - checkoutId
        - destinationZipCode
        - items
      properties:
        checkoutId:
          type: string
        buyerId:
          type: string
        destinationZipCode:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/QuoteItem'
    QuoteItem:
      type: object
      required:
        - sku
        - sellerId
        - quantity
      properties:
        sku:
          type: string
        sellerId:
          type: string
        quantity:
          type: integer
          minimum: 1
    QuoteResponse:
      type: object
      properties:
        checkoutId:
          type: string
        correlationId:
          type: string
        promises:
          type: array
          items:
            $ref: '#/components/schemas/ShippingPromise'
    ShippingPromise:
      type: object
      properties:
        sku:
          type: string
        available:
          type: boolean
        shippingMode:
          type: string
          enum:
            - same_day
            - next_day
            - standard
            - pickup
        estimatedDeliveryDate:
          type: string
          format: date
        price:
          type: number
          format: decimal
        currency:
          type: string
