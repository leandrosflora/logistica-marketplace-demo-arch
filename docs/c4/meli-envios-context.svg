<svg xmlns='http://www.w3.org/2000/svg' width='1400' height='900' viewBox='0 0 1400 900'>
  <defs>
    <marker id='arrow' markerWidth='10' markerHeight='10' refX='9' refY='3' orient='auto' markerUnits='strokeWidth'>
      <path d='M0,0 L0,6 L9,3 z' fill='#374151'/>
    </marker>
    <style>
      .title{font:bold 30px Arial;fill:#111827}.sub{font:15px Arial;fill:#4b5563}.box{fill:#eef4ff;stroke:#2563eb;stroke-width:2;rx:14}.ext{fill:#f9fafb;stroke:#6b7280;stroke-width:2;rx:14}.person{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.label{font:bold 17px Arial;fill:#111827}.body{font:13px Arial;fill:#374151}.line{stroke:#374151;stroke-width:2.2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width='1400' height='900' fill='white'/>
