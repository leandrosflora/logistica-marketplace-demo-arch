site_name: Logística Marketplace — Arquitetura
site_description: Arquitetura de referência para uma plataforma de logística de marketplace orientada a eventos.
site_author: Leandro Flora
site_url: https://leandrosflora.github.io/logistica-marketplace-demo-arch/
repo_name: leandrosflora/logistica-marketplace-demo-arch
repo_url: https://github.com/leandrosflora/logistica-marketplace-demo-arch
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  icon:
    logo: material/truck-fast-outline
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Usar tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Usar tema claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Início: index.md
  - Arquitetura:
      - Mapa de serviços: contracts/services-map.md
      - Dados e ownership: contracts/data-stores.md
      - Segurança: security/security-architecture.md
      - Glossário: glossary/domain-glossary.md
      - Diagramas C4:
          - Contexto: c4/logistica-envios-context.svg
          - Containers: c4/logistica-envios-container.svg
          - Checkout: c4/logistica-envios-checkout-domain-level3.svg
          - Pedido: c4/logistica-envios-order-domain-level3.svg
          - Saga de pedido: c4/logistica-envios-order-saga-level3.svg
          - Promessa de entrega: c4/logistica-envios-shipping-promise-domain-level3.svg
          - Entrega: c4/logistica-envios-shipment-domain-level3.svg
          - Rastreio: c4/logistica-envios-tracking-domain-level3.svg
  - Contratos:
      - Visão geral: contracts/README.md
      - APIs REST: contracts/api-contract-validation.md
      - OpenAPI: contracts/logistica-envios-apis.openapi.yaml
      - Eventos Kafka: contracts/kafka-events.md
      - Governança de schemas: contracts/kafka-schema-governance.md
  - Serviços:
      - Product Search: services/product-search-service.md
      - Product Catalog: services/product-catalog-service.md
      - Checkout: services/checkout-service.md
      - Shipping Promise: services/shipping-promise-service.md
      - Shipping Pricing: services/shipping-pricing-service.md
      - Inventory: services/inventory-service.md
      - Fulfillment Center: services/fulfillment-center-service.md
      - Routing: services/routing-service.md
      - Carrier: services/carrier-service.md
      - Order: services/order-service.md
      - Payment: services/payment-service.md
      - Shipment: services/shipment-service.md
      - Tracking: services/tracking-service.md
      - Notification: services/notification-service.md
      - Audit: services/audit-service.md
      - Order Visibility: services/order-visibility-service.md
  - Jornadas:
      - Visão geral: sequence-diagrams/README.md
      - Jornada principal: sequence-diagrams/00-overview-shipping-journey-happy-path.svg
      - Busca e cotação: sequence-diagrams/01-product-search-and-quote-happy-path.svg
      - Confirmação do checkout: sequence-diagrams/02-checkout-confirmation-and-order-created.svg
      - Saga de reservas: sequence-diagrams/03-order-saga-reservations-and-shipment-happy-path.svg
      - Rastreio e notificação: sequence-diagrams/04-tracking-and-notification-happy-path.svg
  - Decisões:
      - EDA: adr/0001-use-event-driven-architecture.md
      - Saga Orchestrator: adr/0002-saga-orchestrator-pattern.md
      - Arquitetura Hexagonal: adr/0003-hexagonal-clean-architecture.md
      - Versionamento Kafka: adr/0004-kafka-schema-versioning.md
      - Idempotência: adr/0005-idempotency-strategy.md
      - Observabilidade: adr/0006-observability-stack.md
      - Tópicos da saga: adr/0007-order-service-internal-saga-topics.md
  - Operação:
      - CI/CD: devops/ci-cd.md
      - Pipeline: cicd/pipeline.md
      - Deployment: devops/deployment.md
      - Ambientes: devops/environments.md
      - Observabilidade: devops/observability.md
      - Segurança: devops/security.md
      - Runbooks:
          - Kafka local E2E: runbooks/kafka-local-e2e.md
          - Observabilidade local: runbooks/observability-local.md
          - Order Visibility local: runbooks/order-visibility-local.md

