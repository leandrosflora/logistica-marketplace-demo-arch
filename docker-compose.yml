services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: logistica-envios-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logistica-envios-kafka-ui
    ports:
      - "8088:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  redis:
    image: redis:7-alpine
    container_name: logistica-envios-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: logistica-envios-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: logistica_envios
      POSTGRES_USER: logistica
      POSTGRES_PASSWORD: logistica
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/logistica-envios-init.sql:/docker-entrypoint-initdb.d/01-logistica-envios-init.sql:ro

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: logistica-envios-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "5107:4317"    # OTLP gRPC
      - "5108:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - observability

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: logistica-envios-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - observability

  grafana:
    image: grafana/grafana:10.4.0
    container_name: logistica-envios-grafana
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: logistica
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - observability

volumes:
  postgres-data:
  grafana-data:
